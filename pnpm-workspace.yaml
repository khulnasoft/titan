packages:
  - ".github/actions/*"
  - "docs"
  - "cli"
  - "packages/*"
  - "titanrepo-tests/*"
  # Intentionally exclude the `npm` `titan` package from the workspaces.
  - "!packages/titan"
  - "packages/titan-tracing-next-plugin/test/with-mongodb-mongoose"
  - "crates/titanpack-tests/tests/execution"
  - "crates/*/js"
  - examples
  # Exclude the non-monorepo example as it should be treated as independent of this repo
  - "!examples/non-monorepo"
