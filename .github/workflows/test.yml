name: Test
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  determine_jobs:
    name: Determine jobs to run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Find PR Comment
        id: comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- CI COMMENT -->"

      - name: Create or update PR comment
        if: github.event_name == 'pull_request' && steps.comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v2
        continue-on-error: true
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ⏳ CI is running again... ⏳

            [Wait for it...](https://github.com/khulnasoft/titan/actions/runs/${{ github.run_id }})

            <!-- CI COMMENT -->

          edit-mode: replace

      - name: Checkout
        uses: actions/checkout@v3

      - name: CI related changes
        id: ci
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            .github/actions/**
            .github/workflows/test.yml

      - name: Root cargo related changes
        id: cargo
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            Cargo.*
            rust-toolchain

      - name: Titanrepo version changes
        id: titanrepo_version
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            version.txt

      - name: Rust related changes
        id: rust
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            pnpm-lock.yaml
            package.json
            Cargo.**
            crates/**
            shim/**
            xtask/**
            .cargo/**
            rust-toolchain
            !**.md
            !**.mdx

      - name: Titanpack related changes
        id: titanpack
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            pnpm-lock.yaml
            package.json
            crates/**
            xtask/**
            .cargo/**
            rust-toolchain
            !crates/titanrepo*/**
            !**.md
            !**.mdx

      - name: Titanpack Benchmark related changes
        id: titanpack_bench
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            crates/titanpack-bench/**
            !*.md

      - name: Titanpack TypeScript related changes
        id: titanpack_typescript
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            crates/titanpack*/js/**

      - name: Titanrepo Rust related changes
        id: titanrepo_rust
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            pnpm-lock.yaml
            package.json
            crates/titanrepo*/**
            .cargo/**
            rust-toolchain
            !**.md
            !**.mdx

      # We need to keep detecting changes to cli/ because they impact the final build and
      # we want to build and test titanrepo on these changes.
      - name: Titanrepo Go related changes
        id: titanrepo_go
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            cli/**

      - name: Titanrepo integration tests changes
        id: titanrepo_integration
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            titanrepo-tests/integration/**
            titanrepo-tests/helpers/**

      - name: Examples related changes
        id: examples
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            examples/**
            titanrepo-tests/example-*/**
            titanrepo-tests/helpers/**
            !**.md
            !**.mdx

      - name: Titanrepo JS Package related changes
        id: titanrepo_js
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            packages/**

      - name: Docs related changes
        id: docs
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            docs/**

      - name: Formatting related changes
        id: format
        uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/*.{yml,yaml,md,mdx,js,jsx,ts,tsx,json,toml,css}

    outputs:
      rust: ${{ steps.ci.outputs.diff != '' || steps.rust.outputs.diff != '' }}
      cargo_only: ${{ steps.ci.outputs.diff != '' || (steps.cargo.outputs.diff != '' && steps.titanpack.outputs.diff == '' && steps.titanrepo_rust.outputs.diff == '') }}
      # We only test workspace dependency changes on main, not on PRs to speed up CI
      cargo_on_main: ${{ steps.ci.outputs.diff != '' || (steps.cargo.outputs.diff != '' && github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      titanpack: ${{ steps.ci.outputs.diff != '' || steps.titanpack.outputs.diff != '' }}
      titanpack_typescript: ${{ steps.ci.outputs.diff != '' || steps.titanpack_typescript.outputs.diff != '' }}
      titanrepo_rust: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_rust.outputs.diff != '' }}
      titanpack_bench: ${{ steps.ci.outputs.diff != '' || steps.titanpack_bench.outputs.diff != '' }}
      titanrepo_go_unit: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_go.outputs.diff != '' || steps.titanrepo_rust.outputs.diff != '' }}
      titanrepo_go_lint: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_go.outputs.diff != ''}}
      titanrepo_build: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_go.outputs.diff != '' || steps.titanrepo_rust.outputs.diff != '' || steps.titanrepo_integration.outputs.diff != ''}}
      titanrepo_integration: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_go.outputs.diff != '' || steps.titanrepo_rust.outputs.diff != ''  || steps.titanrepo_integration.outputs.diff != '' }}
      examples: ${{ steps.ci.outputs.diff != '' || steps.examples.outputs.diff != '' || steps.titanrepo_version.outputs.diff != '' }}
      titanrepo_js: ${{ steps.ci.outputs.diff != '' || steps.titanrepo_js.outputs.diff != '' }}
      docs: ${{ steps.ci.outputs.diff != '' || steps.docs.outputs.diff != '' }}
      format: ${{ steps.ci.outputs.diff != '' || steps.format.outputs.diff != '' }}
      push: ${{ steps.ci.outputs.diff != '' || github.event_name == 'push' }}
      tag: ${{ steps.ci.outputs.diff != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/node-file-trace')) }}
      main_push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      tag_push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/node-file-trace') }}

  build_titanrepo:
    name: Build Titanrepo
    needs: determine_jobs
    if: needs.determine_jobs.outputs.titanrepo_build == 'true'
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            runner:
              - "self-hosted"
              - "linux"
              - "x64"
              - "metal"
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.3

      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.name == 'windows' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - run: titan run build --filter=cli --color --env-mode=strict --token=${{ secrets.TITAN_TOKEN }} --team=${{ vars.TITAN_TEAM }}
        env:
          SCCACHE_BUCKET: titanrepo-sccache
          SCCACHE_REGION: us-east-2
          # Only use sccache if we're in the Vercel repo.
          RUSTC_WRAPPER: ${{ !github.event.pull_request.head.repo.fork && 'sccache' || '' }}
          CARGO_INCREMENTAL: 0
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EXPERIMENTAL_RUST_CODEPATH: true

      - name: Run sccache stat for check
        shell: bash
        run: ${SCCACHE_PATH} --show-stats
        if: ${{ !github.event.pull_request.head.repo.fork }}

  go_lint:
    name: Go linting
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    needs: determine_jobs
    if: needs.determine_jobs.outputs.titanrepo_go_lint == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Protos
        run: cd cli && make compile-protos

      - name: Build titanrepo-ffi
        run: cd cli && make titanrepo-ffi-install

      - name: golangci Linting
        uses: golangci/golangci-lint-action@v3
        with:
          # More config options documented here: https://github.com/golangci/golangci-lint-action
          version: latest
          working-directory: cli
          args: --new-from-rev=${{ github.event.pull_request.base.sha || 'HEAD~1' }}

  go_unit:
    name: Go Unit Tests
    needs: determine_jobs
    if: needs.determine_jobs.outputs.titanrepo_go_unit == 'true'
    timeout-minutes: 45
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            runner:
              - "self-hosted"
              - "linux"
              - "x64"
              - "metal"
          - runner: macos-latest
          - runner: windows-latest

    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.runner == 'windows-latest' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - run: titan run test --filter=cli --color

  titanrepo_integration:
    name: Titanrepo Integration
    needs: [determine_jobs, build_titanrepo]
    if: needs.determine_jobs.outputs.titanrepo_integration == 'true'
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-latest
          - runner: macos-latest
          - runner: windows-latest
    steps:
      # On Windows, set autocrlf to input so that when the repo is cloned down
      # the fixtures retain their line endings and don't get updated to CRLF.
      # We want this because this repo also contains the fixtures for our test cases
      # and these fixtures have files that need stable file hashes. If we let git update
      # the line endings on checkout, the file hashes will change.
      # https://www.git-scm.com/book/en/v2/Customizing-Git-Git-Configuration#_core_autocrlf
      - name: set crlf
        if: matrix.os.runner == 'windows-latest'
        shell: bash
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.runner == 'windows-latest' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v1
        with:
          macos-skip-brew-update: "true"
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: true

      - name: Cache Prysk
        id: cache-prysk
        uses: actions/cache@v3
        with:
          path: cli/.cram_env
          key: prysk-venv-${{ matrix.os.runner }}

      - name: Integration Tests
        run: titan run test --filter=titanrepo-tests-integration --color --env-mode=strict --token=${{ secrets.TITAN_TOKEN }} --team=${{ vars.TITAN_TEAM }}
        env:
          EXPERIMENTAL_RUST_CODEPATH: true

  titanrepo_integration_go:
    name: Titanrepo Integration (Go Fallback)
    needs: [determine_jobs, build_titanrepo]
    if: needs.determine_jobs.outputs.titanrepo_integration == 'true'
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-latest
          - runner: macos-latest
          - runner: windows-latest
    steps:
      # On Windows, set autocrlf to input so that when the repo is cloned down
      # the fixtures retain their line endings and don't get updated to CRLF.
      # We want this because this repo also contains the fixtures for our test cases
      # and these fixtures have files that need stable file hashes. If we let git update
      # the line endings on checkout, the file hashes will change.
      # https://www.git-scm.com/book/en/v2/Customizing-Git-Git-Configuration#_core_autocrlf
      - name: set crlf
        if: matrix.os.runner == 'windows-latest'
        shell: bash
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v3
      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.runner == 'windows-latest' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v1
        with:
          macos-skip-brew-update: "true"
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: true

      - name: Cache Prysk
        id: cache-prysk
        uses: actions/cache@v3
        with:
          path: cli/.cram_env
          key: prysk-venv-${{ matrix.os.runner }}

      - name: Integration Tests
        run: titan run test:go-fallback --filter=titanrepo-tests-integration --color --env-mode=strict --token=${{ secrets.TITAN_TOKEN }} --team=${{ vars.TITAN_TEAM }}

  titanrepo_examples:
    name: Titanrepo Examples
    needs: [determine_jobs]
    if: needs.determine_jobs.outputs.examples == 'true'
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-latest
          - runner: macos-latest
          # TODO: enable this
          # - runner: windows-latest
    runs-on: ${{ matrix.os.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Disable corepack. actions/setup-node invokes other package managers and
      # that causes corepack to throw an error, so we disable it first.
      - name: Disable corepack
        shell: bash
        run: corepack disable

      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.runner == 'windows-latest' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check examples
        shell: bash
        run: titan run test -F "@titanrepo-examples-tests/*" --continue --color --remote-only --token=${{ secrets.TITAN_TOKEN }} --team=${{ vars.TITAN_TEAM }} --env-mode=strict

      # Disable corepack again. actions/setup-node's "Post" step runs at the end of
      # this job invokes other package managers, and corepack throws an error.
      # (corepack was enabled from inside the tests above).
      - name: Disable corepack again
        shell: bash
        run: corepack disable

  js_packages:
    name: JS Package Tests
    timeout-minutes: 30
    if: needs.determine_jobs.outputs.titanrepo_js == 'true' || needs.determine_jobs.outputs.docs == 'true'
    needs: [determine_jobs]
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            runner:
              - "self-hosted"
              - "linux"
              - "x64"
              - "metal"
          - name: macos
            runner: macos-latest
    env:
      TITAN_TOKEN: ${{ secrets.TITAN_TOKEN }}
      TITAN_TEAM: ${{ vars.TITAN_TEAM }}
      TITAN_REMOTE_ONLY: true

    steps:
      # on main -> current + prev commit
      # pr -> pr commits + base commit
      - name: Determine fetch depth
        id: fetch-depth
        run: |
          echo "depth=$(( ${{ github.event.pull_request.commits || 1 }} + 1 ))" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ steps.fetch-depth.outputs.depth  }}

      - name: Build titanrepo CLI from source
        uses: ./.github/actions/setup-titanrepo-environment
        with:
          windows: ${{ matrix.os.name == 'windows' }}
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run tests
        run: |
          titan run check-types test --filter=docs --filter={./packages/*}...[${{ github.event.pull_request.base.sha || 'HEAD^1' }}] --color --env-mode=strict
        env:
          EXPERIMENTAL_RUST_CODEPATH: true

  titanpack_typescript:
    name: Titanpack TypeScript files
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    needs: determine_jobs
    if: needs.determine_jobs.outputs.titanpack_typescript == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install -r --side-effects-cache false

      - name: Check titanpack-node types
        working-directory: crates/titanpack-node/js
        run: pnpm run check

      - name: Check titanpack-cli types
        working-directory: crates/titanpack-cli/js
        run: pnpm run check

      - name: Check titanpack-ecmascript-runtime types
        working-directory: crates/titanpack-ecmascript-runtime/js
        run: pnpm run check

  rust_lint:
    needs: [determine_jobs]
    if: needs.determine_jobs.outputs.rust == 'true'
    name: Rust lints
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Run cargo fmt check
        run: |
          cargo fmt --check

      - name: Check Cargo.toml formatting (taplo)
        run: npx @taplo/cli format --check

      - name: Check licenses
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check licenses

  titanrepo_rust_check:
    needs: [determine_jobs]
    # We test dependency changes only on main
    if: |
      (needs.determine_jobs.outputs.rust == 'true' && needs.determine_jobs.outputs.titanrepo_rust == 'true') ||
      needs.determine_jobs.outputs.cargo_on_main == 'true' ||
      needs.determine_jobs.outputs.cargo_only == 'true'
    name: Titanrepo rust check
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Setup capnproto
        uses: ./.github/actions/setup-capnproto

      - name: Run cargo check
        run: |
          cargo groups check titanrepo-libraries --features rustls-tls

  titanrepo_rust_clippy:
    needs: [titanrepo_rust_check]
    name: Titanrepo rust clippy
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Setup capnproto
        uses: ./.github/actions/setup-capnproto

      - name: Run cargo clippy
        run: |
          cargo groups clippy titanrepo-libraries --features rustls-tls -- --deny clippy::all

      - name: Run ast-grep lints
        run: |
          npx --package @ast-grep/cli -- ast-grep scan $(cargo groups list titanrepo-libraries | awk '{ print $2 }' | tr '\n' ' ')

  titanpack_rust_check:
    needs: [determine_jobs]
    # We test dependency changes only on main
    if: |
      (needs.determine_jobs.outputs.rust == 'true' && needs.determine_jobs.outputs.titanpack == 'true') ||
      needs.determine_jobs.outputs.cargo_on_main == 'true' ||
      needs.determine_jobs.outputs.cargo_only == 'true'
    name: Titanpack rust check
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run cargo check release
        run: |
          RUSTFLAGS="-D warnings -A deprecated" cargo groups check titanpack --features rustls-tls --release

  titanpack_rust_clippy:
    needs: [titanpack_rust_check]
    name: Titanpack rust clippy
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Run cargo clippy
        run: |
          RUSTFLAGS="-D warnings -A deprecated" cargo groups clippy titanpack --features rustls-tls

      - name: Run ast-grep lints
        run: |
          npx --package @ast-grep/cli -- ast-grep scan $(cargo groups list titanpack | awk '{ print $2 }' | tr '\n' ' ')

  next_dev_check:
    needs: [determine_jobs]
    if: needs.determine_jobs.outputs.titanpack == 'true' || needs.determine_jobs.outputs.cargo_on_main == 'true'
    name: Check next-swc
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Next.js
        uses: actions/checkout@v3
        with:
          repository: vercel/next.js

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build next-swc
        run: |
          export TITANPACK_REMOTE="https://github.com/khulnasoft/titan"

          # patch the titan git dependency with the commit of the current PR.
          export BINDING=$(printf 'patch."%s".%s.git="%s?rev=%s"' "$TITANPACK_REMOTE" "titanpack-binding" "$TITANPACK_REMOTE" "$GITHUB_SHA")
          export TASKS=$(printf 'patch."%s".%s.git="%s?rev=%s"' "$TITANPACK_REMOTE" "titan-tasks" "$TITANPACK_REMOTE" "$GITHUB_SHA")
          export TASKS_FS=$(printf 'patch."%s".%s.git="%s?rev=%s"' "$TITANPACK_REMOTE" "titan-tasks-fs" "$TITANPACK_REMOTE" "$GITHUB_SHA")

          # set pipefail so the exit code of `cargo check` gets preserved
          (set -o pipefail && \
          cargo check \
            --config $BINDING --config $TASKS --config $TASKS_FS \
            --all -p next-swc-api \
            --no-default-features --features custom_allocator,rustls-tls \
            --message-format short --quiet \
          2>&1 | tee cargo_output.log)

      - name: Success Log
        run: |
          printf ":white_check_mark: This change can build \`next-swc\`" > out.log

      - name: Post logs if there are errors
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          job_url=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs --paginate --jq '.jobs.[] | select(.name == "Check next-swc").html_url')

          # strip ansi colors with `sed`
          echo "\
          ⚠️ This change may fail to build \`next-swc\`.

          <details><summary>Logs</summary>
          <p>

          \`\`\`
          $(cat cargo_output.log | sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2};?)?)?[mGK]//g")
          \`\`\`
          </p>
          </details>

          See [job summary]($job_url) for details
          " > out.log

      - name: PR comment with file
        uses: thollander/actions-comment-pull-request@v2
        if: always() && github.repository == 'khulnasoft/titan'
        # We'll not block CI on this step
        continue-on-error: true
        with:
          filePath: ./out.log
          comment_tag: check_next_swc_titanpack

  titanrepo_rust_test:
    needs: [titanrepo_rust_check]
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu
            runner:
              - "self-hosted"
              - "linux"
              - "x64"
              - "metal"
            nextest: linux
          - name: macos
            runner: macos-latest
            nextest: mac
          - name: windows
            runner: windows-latest
            nextest: windows-tar
    runs-on: ${{ matrix.os.runner }}
    name: Titanrepo Rust testing on ${{ matrix.os.name }}
    steps:
      - name: Set git to use LF line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        if: matrix.os.name == 'windows'

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-cache: true

      - name: Setup capnproto
        uses: ./.github/actions/setup-capnproto

      - name: Setup Protoc
        uses: arduino/setup-protoc@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        timeout-minutes: 120
        run: |
          cargo groups test titanrepo-libraries

  titanpack_rust_test1:
    needs: [titanpack_rust_check]
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    name: Titanpack Rust testing on ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-cache: true

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: 18

      - name: Install tests dependencies
        working-directory: crates/titanpack/tests/node-file-trace
        run: pnpm install -r --side-effects-cache false

      - name: Install tests dependencies in examples/with-yarn
        working-directory: examples/with-yarn
        run: npm install

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.61

      - name: Build nextest
        timeout-minutes: 120
        run: |
          cargo tp-pre-test
      - name: Run nextest
        timeout-minutes: 120
        run: |
          cargo tp-test --profile tp-test-linux

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test_reports
          path: target/nextest/**/*.xml

  titanpack_rust_test2:
    needs: [titanpack_rust_check]
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: macos
            runner: macos-latest
          - name: windows
            runner: windows-latest
    runs-on: ${{ matrix.os.runner }}
    name: Titanpack Rust testing on ${{ matrix.os.name }}
    steps:
      - name: Set git to use LF line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        if: matrix.os.name == 'windows'

      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          # TODO: Remove this specific version constraint once pnpm ships with
          # node-gyp that's compatible with Python 3.12+
          python-version: 3.11

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-cache: true

      - name: Setup Node.js
        uses: ./.github/actions/setup-node
        with:
          node-version: 18

      - name: Setup Protoc
        uses: arduino/setup-protoc@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare toolchain on Windows
        run: |
          pnpx node-gyp install
          echo 'node-linker = "hoisted"' > crates/titanpack/tests/node-file-trace/.npmrc
        if: matrix.os.name == 'windows'

      - name: Install tests dependencies
        working-directory: crates/titanpack/tests/node-file-trace
        run: pnpm install -r --side-effects-cache false

      - name: Install tests dependencies in examples/with-yarn
        working-directory: examples/with-yarn
        run: npm install

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.61

      - name: Build nextest
        timeout-minutes: 120
        run: |
          cargo tp-pre-test

      - name: Run nextest (Mac)
        timeout-minutes: 120
        if: matrix.os.name == 'macos'
        run: |
          cargo tp-test --profile tp-test-mac

      - name: Run nextest (Windows)
        timeout-minutes: 120
        if: matrix.os.name == 'windows'
        run: |
          cargo tp-test --profile tp-test-win

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test_reports
          path: target/nextest/**/*.xml

  titanpack_rust_test_bench1:
    needs: [determine_jobs, titanpack_rust_check]
    name: Titanpack Rust testing benchmarks on linux
    uses: ./.github/workflows/test-titanpack-rust-bench-test.yml
    with:
      # custom runner label specific to workflow
      runner: ubuntu-latest-metal
      os: linux
      all: ${{ needs.determine_jobs.outputs.titanpack_bench == 'true' }}

  titanpack_rust_test_bench2:
    needs: [determine_jobs, titanpack_rust_check]
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: macos
            runner: macos-latest
          # Temporarily disable windows bench due to consistent timeouts
          # - name: windows
          #   runner: windows-2019
    name: Titanpack Rust testing benchmarks on ${{ matrix.os.name }}
    uses: ./.github/workflows/test-titanpack-rust-bench-test.yml
    with:
      runner: ${{ matrix.os.runner }}
      os: ${{ matrix.os.name }}
      all: ${{ needs.determine_jobs.outputs.titanpack_bench == 'true' }}

  format_lint:
    name: Formatting
    runs-on:
      - "self-hosted"
      - "linux"
      - "x64"
      - "metal"
    needs: determine_jobs
    if: needs.determine_jobs.outputs.format == 'true'
    env:
      TITAN_TOKEN: ${{ secrets.TITAN_TOKEN }}
      TITAN_TEAM: ${{ vars.TITAN_TEAM }}
      TITAN_REMOTE_ONLY: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: ./.github/actions/setup-titanrepo-environment
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Lint
        # Filters some workspaces out:
        # - `cli` because it runs golangci-lint and this Job doesn't have all the dependencies for that.
        # - Other `@khulnasoft/*` packages because ??
        run: titan run lint --filter=!cli --filter=!@vercel/devlow-bench --filter=!@vercel/experimental-nft-next-plugin --filter=!@vercel/experimental-nft-next-plugin --filter=!titanpack-bump-action --filter=!next-integration-stat --env-mode=strict
        env:
          EXPERIMENTAL_RUST_CODEPATH: true

  final:
    name: Ok
    needs:
      - determine_jobs
      - go_lint
      - go_unit
      - titanrepo_examples
      - titanrepo_integration
      - titanrepo_integration_go
      - js_packages
      - rust_lint
      - titanrepo_rust_check
      - titanrepo_rust_clippy
      - titanpack_rust_check
      - titanpack_rust_clippy
      - titanpack_rust_test1
      - titanpack_rust_test_bench1
      - titanpack_typescript
      - titanrepo_rust_test
      - format_lint
    if: always()
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Compute info
        id: info
        if: always()
        run: |
          cancelled=false
          failure=false
          subjob () {
            local result=$1
            local name=$2
            if [ "$result" = "cancelled" ]; then
              cancelled=true
            elif [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "- $name" >> failures.md
              failure=true
            fi
          }
          subjob ${{needs.determine_jobs.result}} "Determining jobs"
          subjob ${{needs.go_lint.result}} "Go linting"
          subjob ${{needs.go_unit.result}} "Go unit tests"
          subjob ${{needs.titanrepo_examples.result}} "Titanrepo examples"
          subjob ${{needs.titanrepo_integration.result}} "Titanrepo integration tests"
          subjob ${{needs.titanrepo_integration_go.result}} "Titanrepo integration tests (Go fallback)"
          subjob ${{needs.js_packages.result}} "JS Package tests"
          subjob ${{needs.rust_lint.result}} "Rust lints"
          subjob ${{needs.titanrepo_rust_check.result}} "Titanrepo Rust checks"
          subjob ${{needs.titanrepo_rust_clippy.result}} "Titanrepo Rust clippy"
          subjob ${{needs.titanpack_rust_check.result}} "Titanpack Rust checks"
          subjob ${{needs.titanpack_rust_clippy.result}} "Titanpack Rust clippy"
          subjob ${{needs.titanpack_rust_test1.result}} "Titanpack Rust tests (linux)"
          subjob ${{needs.titanpack_rust_test_bench1.result}} "Titanpack Rust benchmark tests (linux)"
          subjob ${{needs.titanpack_typescript.result}} "Titanpack Typescript checks"
          subjob ${{needs.titanrepo_rust_test.result}} "Titanrepo Rust tests"
          subjob ${{needs.format_lint.result}} "Formatting"
          if [ "$cancelled" = "true" ]; then
             echo "cancelled=true" >> $GITHUB_OUTPUT
          elif [ "$failure" = "true" ]; then
            echo "failure=true" >> $GITHUB_OUTPUT
          else
            echo "success=true" >> $GITHUB_OUTPUT
          fi

      - name: Add failure prose text
        if: steps.info.outputs.failure == 'true'
        run: |
          echo "## ⚠ CI failed ⚠" > comment.md
          echo >> comment.md
          echo "The following steps have failed in CI:" >> comment.md
          echo >> comment.md
          cat failures.md >> comment.md
          echo >> comment.md
          echo "See [workflow summary](https://github.com/khulnasoft/titan/actions/runs/${{ github.run_id }}) for details">> comment.md
          echo >> comment.md
          echo "<!-- CI COMMENT -->" >> comment.md

      - name: Add success prose text
        if: steps.info.outputs.success == 'true'
        run: |
          echo "## 🟢 CI likely successful 🟢" > comment.md
          echo >> comment.md
          echo "A few longer running steps are still running, but they should not be considered as blocking." >> comment.md
          echo >> comment.md
          echo "See [workflow summary](https://github.com/khulnasoft/titan/actions/runs/${{ github.run_id }}) for details">> comment.md
          echo >> comment.md
          echo "<!-- CI COMMENT -->" >> comment.md

      - name: Find PR Comment
        id: comment
        if: always() && github.event_name == 'pull_request' && steps.info.outputs.cancelled != 'true'
        uses: peter-evans/find-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- CI COMMENT -->"

      - name: Create or update PR comment
        if: always() && github.event_name == 'pull_request' && steps.info.outputs.cancelled != 'true'
        uses: peter-evans/create-or-update-comment@v2
        continue-on-error: true
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: "comment.md"
          edit-mode: replace

      - name: It's not fine
        if: steps.info.outputs.failure == 'true'
        run: exit 1

      - name: It's fine
        if: steps.info.outputs.success == 'true'
        run: echo Ok

  # Upload Titanpack's test results into datadog.
  upload_test_results:
    name: Upload Test results
    needs: [determine_jobs, titanpack_rust_test1, titanpack_rust_test2]
    # We have to set condition to always, since we want to upload test results for the failed tests as well.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    # Do not block CI if upload fails for some reason
    continue-on-error: true
    steps:
      # Uploading test results does not require titanpack's src codes, but this
      # allows datadog uploader to sync with git information.
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3.6.0
        with:
          node-version: 18

      - name: Install datadog
        run: npm install -g @datadog/datadog-ci@2.18.1

      - name: Download test results
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Upload
        continue-on-error: true
        env:
          DATADOG_API_KEY: ${{ secrets.DD_KEY_TITANPACK }}
        run: |
          DD_ENV=ci datadog-ci junit upload --service Titanpack ./artifacts/test_reports/**/*.xml

  done:
    name: Done
    needs:
      - final
      - determine_jobs
      - go_lint
      - go_unit
      - titanrepo_examples
      - titanrepo_integration
      - titanrepo_integration_go
      - rust_lint
      - titanrepo_rust_check
      - titanrepo_rust_clippy
      - titanpack_rust_check
      - titanpack_rust_clippy
      - titanpack_rust_test1
      - titanpack_rust_test2
      - titanpack_rust_test_bench1
      - titanpack_rust_test_bench2
      - titanpack_typescript
      - titanrepo_rust_test
      - format_lint
    if: always()
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Compute info
        id: info
        if: always()
        run: |
          cancelled=false
          failure=false
          subjob () {
            local result=$1
            local name=$2
            echo "$name: $result"
            if [ "$result" = "cancelled" ]; then
              cancelled=true
            elif [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "- $name" >> failures.md
              failure=true
            fi
          }
          subjob ${{needs.determine_jobs.result}} "Determining jobs"
          subjob ${{needs.go_lint.result}} "Go lints"
          subjob ${{needs.go_unit.result}} "Go unit tests"
          subjob ${{needs.titanrepo_examples.result}} "Titanrepo examples"
          subjob ${{needs.titanrepo_integration.result}} "Titanrepo integration tests"
          subjob ${{needs.titanrepo_integration_go.result}} "Titanrepo integration tests (Go fallback)"
          subjob ${{needs.rust_lint.result}} "Rust lints"
          subjob ${{needs.titanrepo_rust_check.result}} "Titanrepo Rust checks"
          subjob ${{needs.titanrepo_rust_clippy.result}} "Titanrepo Rust clippy"
          subjob ${{needs.titanpack_rust_check.result}} "Titanpack Rust checks"
          subjob ${{needs.titanpack_rust_clippy.result}} "Titanpack Rust clippy"
          subjob ${{needs.titanpack_rust_test1.result}} "Titanpack Rust tests (linux)"
          subjob ${{needs.titanpack_rust_test2.result}} "Titanpack Rust tests (mac/win, non-blocking)"
          subjob ${{needs.titanpack_rust_test_bench1.result}} "Titanpack Rust benchmark tests (linux)"
          subjob ${{needs.titanpack_rust_test_bench2.result}} "Titanpack Rust benchmark tests (mac/win, non-blocking)"
          subjob ${{needs.titanpack_typescript.result}} "Titanpack Typescript checks"
          subjob ${{needs.titanrepo_rust_test.result}} "TitanRepo Rust tests"
          subjob ${{needs.format_lint.result}} "Formatting"
          if [ "$cancelled" = "true" ]; then
             echo "cancelled=true" >> $GITHUB_OUTPUT
          elif [ "$failure" = "true" ]; then
            echo "failure=true" >> $GITHUB_OUTPUT
          else
            echo "success=true" >> $GITHUB_OUTPUT
          fi

      - name: Add failure prose text
        if: steps.info.outputs.failure == 'true'
        run: |
          echo "## ⚠️ CI failed ⚠️" > comment.md
          echo >> comment.md
          echo "The following steps have failed in CI:" >> comment.md
          echo >> comment.md
          cat failures.md >> comment.md
          echo >> comment.md
          echo "See [workflow summary](https://github.com/khulnasoft/titan/actions/runs/${{ github.run_id }}) for details">> comment.md
          echo >> comment.md
          echo "<!-- CI COMMENT -->" >> comment.md

      - name: Add success prose text
        if: steps.info.outputs.success == 'true'
        run: |
          echo "## 🟢 CI successful 🟢" > comment.md
          echo >> comment.md
          echo "Thanks" >> comment.md
          echo >> comment.md
          echo "<!-- CI COMMENT -->" >> comment.md

      - name: Find PR Comment
        id: comment
        if: always() && github.event_name == 'pull_request' && steps.info.outputs.cancelled != 'true'
        uses: peter-evans/find-comment@v2
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- CI COMMENT -->"

      - name: Create or update PR comment
        if: always() && github.event_name == 'pull_request' && steps.info.outputs.cancelled != 'true'
        uses: peter-evans/create-or-update-comment@v2
        continue-on-error: true
        with:
          comment-id: ${{ steps.comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: "comment.md"
          edit-mode: replace

      - name: It's not fine
        if: steps.info.outputs.failure == 'true'
        run: exit 1

      - name: It's fine
        if: steps.info.outputs.success == 'true'
        run: echo Ok

  cleanup:
    name: Cleanup
    needs: [done]
    if: always()
    uses: ./.github/workflows/pr-clean-caches.yml
    secrets: inherit